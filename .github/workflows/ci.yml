name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  worker:
    name: Worker — typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun tsc --noEmit

      - name: Run tests
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: placeholder-for-ci
          OPENAI_API_KEY: placeholder-for-ci
          ANTHROPIC_API_KEY: placeholder-for-ci
        run: bun test --bail
